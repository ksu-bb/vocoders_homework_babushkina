mel_spec:
  sr: 22050
  win_length: 1024
  hop_length: 256
  n_fft: 1024
  f_min: 0
  f_max: 11025
  n_mels: 80
  power: 2.0
  pad_value: -11.5129251

data:
  audio_path: ./data/RUSLAN
  filelist_path: ./data/filelists
  batch_size: 4
  num_workers: 2

training:
  epochs: 100
  learning_rate: 0.0002
  log_every: 100
  checkpoint_path: ./checkpoints
  betas: [0.8, 0.99]
  weight_decay: 0.01
  gradient_accumulation_steps: 4 

generator:
  n_mels: 80
  upsample_rates: [8, 8, 2, 2]  
  upsample_kernel_sizes: [16, 16, 4, 4]
  upsample_initial_channel: 512
  resblock_kernel_sizes: [3, 7, 11]
  resblock_dilation_sizes: [[1, 3, 5], [1, 3, 5], [1, 3, 5]]

loss:
  lambda_fm: 2.0
  lambda_mel: 45.0